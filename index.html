<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#fafaf8">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Slate">
  <meta name="description" content="Slate — A beautiful, free-form digital notebook.">
  <title>Slate</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
</head>
<body>

  <!-- App Loader -->
  <div id="app-loader" aria-hidden="true">
    <div class="loader-logo">Slate</div>
  </div>

  <!-- Top Bar -->
  <header id="top-bar">
    <div class="topbar-left">
      <button id="gallery-btn" class="icon-btn" aria-label="Open gallery" title="Gallery">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
      </button>
      <button id="back-btn" class="icon-btn hidden" aria-label="Back to notebook" title="Back to notebook">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>

    <div id="topbar-center">
      <span id="date-label"></span>
    </div>

    <div class="topbar-right">
      <div id="sync-pill" class="sync-pill" aria-live="polite">
        <span class="sync-dot"></span>
        <span class="sync-text"></span>
      </div>
      <div id="auth-wrap">
        <div id="g_id_onload"
             data-client_id="YOUR_GOOGLE_CLIENT_ID"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin"
             data-type="icon"
             data-shape="circle"
             data-theme="outline"
             data-size="medium">
        </div>
        <div id="user-widget" class="hidden">
          <img id="user-avatar" src="" alt="Account" tabindex="0" role="button" aria-label="Account menu" aria-haspopup="true" aria-expanded="false">
          <div id="user-menu" class="hidden" role="menu">
            <div id="user-name-label" class="user-name-label"></div>
            <button id="export-btn" role="menuitem">Export notes</button>
            <button id="logout-btn" role="menuitem" class="menu-danger">Sign out</button>
          </div>
        </div>
      </div>
      <button id="new-page-btn" class="icon-btn" aria-label="New page" title="New page (⌘N)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </header>

  <!-- App Root -->
  <div id="app">

    <!-- Slate Toolbar -->
    <div id="slate-toolbar" role="toolbar" aria-label="Slate tools">
      <div class="tb-section tb-modes">
        <button id="tb-mode-text" class="tb-btn active" title="Text mode" aria-label="Text mode">T</button>
        <button id="tb-mode-checklist" class="tb-btn" title="Checklist mode" aria-label="Checklist mode">✓</button>
        <button id="tb-mode-draw" class="tb-btn" title="Draw mode" aria-label="Draw mode">✏</button>
      </div>
      <div class="tb-divider"></div>
      <div class="tb-section">
        <button id="zoom-in"  class="tb-btn" title="Zoom in"  aria-label="Zoom in">+</button>
        <button id="zoom-out" class="tb-btn" title="Zoom out" aria-label="Zoom out">−</button>
      </div>
      <div class="tb-divider"></div>
      <div class="tb-section" id="tb-format">
        <select id="tb-font" class="tb-select" title="Font" aria-label="Font">
          <option value="serif">Sf</option>
          <option value="roboto">Rb</option>
        </select>
        <button id="tb-italic"    class="tb-btn" title="Italic"     aria-label="Italic"><em>I</em></button>
        <button id="tb-underline" class="tb-btn" title="Underline"  aria-label="Underline"><u>U</u></button>
        <input type="color" id="tb-color" value="#1a1a1a" class="tb-color-input" title="Text color" aria-label="Text color">
        <input type="text"  id="tb-color-hex" value="#1a1a1a" class="tb-color-hex" maxlength="7" placeholder="#hex" aria-label="Hex color">
      </div>
      <div class="tb-section hidden" id="tb-draw-controls">
        <input type="color" id="tb-draw-color" value="#1a1a1a" class="tb-color-input" title="Pen color" aria-label="Pen color">
        <input type="range" id="tb-draw-width" min="1" max="12" value="2" class="tb-range" title="Pen size" aria-label="Pen size">
      </div>
    </div>

    <!-- Notebook View -->
    <div id="notebook-view">
      <div id="notebook-track">
        <!-- Spread elements injected by JS -->
      </div>
    </div>

    <!-- Gallery View -->
    <div id="gallery-view" class="hidden">
      <div id="scroll-date-indicator" aria-live="polite"></div>
      <div id="gallery-scroller">
        <!-- Month groups injected by JS -->
      </div>
      <div id="gallery-empty" class="hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <h2>No pages yet</h2>
        <p>Tap <strong>+</strong> to create your first page.</p>
      </div>
    </div>

  </div>

  <!-- Toast -->
  <div id="toast-container" aria-live="assertive" aria-atomic="true"></div>

  <!-- Confirm Dialog -->
  <div id="confirm-overlay" class="hidden" role="dialog" aria-modal="true" aria-labelledby="confirm-msg">
    <div id="confirm-box">
      <p id="confirm-msg"></p>
      <div class="confirm-actions">
        <button id="confirm-cancel">Cancel</button>
        <button id="confirm-ok" class="danger-btn">Delete</button>
      </div>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="app.js"></script>
</body>
</html>
